spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

          routes:
            - id: auth-service
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=0

            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=0
                - AuthenticationFilter

            - id: document-service
              uri: ${DOCUMENT_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/documents/**
              filters:
                - StripPrefix=0
                - AuthenticationFilter

            - id: workflow-service
              uri: ${WORKFLOW_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/workflow/**,/api/pipelines/**
              filters:
                - StripPrefix=0
                - AuthenticationFilter

            - id: tracking-service
              uri: ${TRACKING_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/tracking/**
              filters:
                - StripPrefix=0
                - AuthenticationFilter

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=0
                - AuthenticationFilter

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - AddResponseHeader=X-Gateway-Version, 1.0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    "[org.springframework.cloud.gateway]": DEBUG
    "[reactor.netty]": INFO

security:
  jwt:
    enabled: true
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation1234567890}
    issuer: ${JWT_ISSUER:}
    audience: ${JWT_AUDIENCE:}
    clock-skew-seconds: ${JWT_CLOCK_SKEW:60}
