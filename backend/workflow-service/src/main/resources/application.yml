spring:
  application:
    name: workflow-service

  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8083

document-service:
  base-url: ${DOCUMENT_SERVICE_BASE_URL:http://localhost:8082}

tracking-service:
  base-url: ${TRACKING_SERVICE_BASE_URL:http://localhost:8084}

# Workflow event publishing configuration
workflow:
  events:
    exchange: workflow-events-exchange

# Camunda Configuration
camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
    auto-deployment-enabled: true
    history-level: full
    database:
      schema-update: true
    job-execution:
      enabled: true

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
