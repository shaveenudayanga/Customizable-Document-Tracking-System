spring:
  datasource:
    url: jdbc:h2:mem:docutrace;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Disable Flyway migrations during tests (optional). If you want to run migrations against H2,
# set this to true and ensure migrations are compatible with H2.
spring.flyway.enabled: false

# Disable Camunda DB schema update during tests (Camunda will use the H2 connection)
camunda:
  bpm:
    database:
      schema-update: true
    job-execution:
      enabled: false
