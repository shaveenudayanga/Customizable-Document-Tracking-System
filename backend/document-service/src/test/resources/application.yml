# Test profile configuration (H2 in-memory + multipart limits)
spring:
  datasource:
    url: 'jdbc:h2:mem:docservice-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE'
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

storage:
  base-path: ${java.io.tmpdir}/doc-service-tests

logging:
  level:
    root: WARN

springdoc:
  api-docs:
    path: /openapi
    enabled: true
  swagger-ui:
    path: /swagger-ui
