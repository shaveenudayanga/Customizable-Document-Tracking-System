spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/docutrace_users
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO

app:
  jwt:
    issuer: ${JWT_ISSUER:http://user-service}
    audience: ${JWT_AUDIENCE:docutrace}
    expiration-access-minutes: ${JWT_ACCESS_MINUTES:30}
    expiration-refresh-days: ${JWT_REFRESH_DAYS:7}
  security:
    refresh-hmac-secret: ${REFRESH_HMAC_SECRET:change-me}
    magic-token-hmac-secret: ${MAGIC_TOKEN_HMAC_SECRET:change-me}
  tenant:
    enforce: ${TENANT_ENFORCE:false}
    login-enforce: ${TENANT_LOGIN_ENFORCE:false}

---
# Production profile (used inside docker / k8s)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:5432/docutrace_users
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true

logging:
  level:
    root: INFO