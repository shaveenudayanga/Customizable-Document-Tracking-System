spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://postgres:5432/docutrace_users
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

server:
  port: 8080

logging:
  level:
    root: INFO

security:
  jwt:
  # Deprecated for HS256; RS256 used by default with in-memory key for dev
  secret: ${JWT_SECRET:unused-for-rs256}
  expiration-access-minutes: ${JWT_ACCESS_MINUTES:30}
  expiration-refresh-days: ${JWT_REFRESH_DAYS:7}
  tenant:
    # Turn on to enforce tenant match among subdomain/JWT/user
    enforce: ${TENANT_ENFORCE:false}
  # When true, login is only permitted if Host tenant matches the user's stored tenant
  login-enforce: ${TENANT_LOGIN_ENFORCE:false}

---
# Production profile (used inside docker / k8s)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://db:5432/docutrace_users
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
logging:
  level:
    root: INFO
security:
  jwt:
    secret: ${JWT_SECRET:prod-override-secret}
    expiration-access-minutes: ${JWT_ACCESS_MINUTES:30}
    expiration-refresh-days: ${JWT_REFRESH_DAYS:7}
  tenant:
    enforce: ${TENANT_ENFORCE:false}
    login-enforce: ${TENANT_LOGIN_ENFORCE:false}
