version: '3.8'
services:
  db:
    image: postgres:15
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ima123
    # We don't need to expose Postgres to the host for the app-to-db communication
    # inside the compose network. If you need host access, map 5432 or another port.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: notification-service:local
    container_name: notification-service-app
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/notificationdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ima123
      SERVER_PORT: "1002"
    ports:
      - "1002:1002"
    restart: on-failure

volumes:
  pgdata: