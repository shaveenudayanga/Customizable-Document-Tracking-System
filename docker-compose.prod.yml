# Customizable Document Tracking System - Production Deployment

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: docutrace-postgres
    environment:
      POSTGRES_DB: docutrace
      POSTGRES_USER: docutrace
      POSTGRES_PASSWORD: docutrace123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docutrace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docutrace-network

  # User Service
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: docutrace-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Document Service
  document-service:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: docutrace-document-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - document_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Workflow Service
  workflow-service:
    build:
      context: ./backend/workflow-service
      dockerfile: Dockerfile
    container_name: docutrace-workflow-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workflow_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Tracking Service
  tracking-service:
    build:
      context: ./backend/tracking-service
      dockerfile: Dockerfile
    container_name: docutrace-tracking-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracking_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docutrace-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: http://localhost
    depends_on:
      - user-service
      - document-service
      - workflow-service
      - tracking-service
    networks:
      - docutrace-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: docutrace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - user-service
      - document-service
      - workflow-service
      - tracking-service
    networks:
      - docutrace-network

volumes:
  postgres_data:
  document_uploads:

networks:
  docutrace-network:
    driver: bridge