# Customizable Document Tracking System - Production Deployment

version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: docutrace-postgres
    environment:
      POSTGRES_DB: docutrace
      POSTGRES_USER: docutrace
      POSTGRES_PASSWORD: docutrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docutrace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docutrace-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: docutrace-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docutrace-network

  # User Service
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: docutrace-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Document Service
  document-service:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: docutrace-document-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - document_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Workflow Service
  workflow-service:
    build:
      context: ./backend/workflow-service
      dockerfile: Dockerfile
    container_name: docutrace-workflow-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workflow_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Tracking Service
  tracking-service:
    build:
      context: ./backend/tracking-service
      dockerfile: Dockerfile
    container_name: docutrace-tracking-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracking_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # Notification Service
  notification-service:
    build:
      context: ./backend/notification-service_new
      dockerfile: Dockerfile
    container_name: docutrace-notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: docutrace
      SPRING_DATASOURCE_PASSWORD: docutrace123
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - docutrace-network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: docutrace-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SECURITY_JWT_SECRET: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation1234567890}
      USER_SERVICE_URI: http://user-service:8081
      DOCUMENT_SERVICE_URI: http://document-service:8082
      WORKFLOW_SERVICE_URI: http://workflow-service:8083
      TRACKING_SERVICE_URI: http://tracking-service:8084
  NOTIFICATION_SERVICE_URI: http://notification-service:8085
    depends_on:
      user-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      workflow-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - docutrace-network

  # MailHog (Development SMTP Server for testing emails)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: docutrace-mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    networks:
      - docutrace-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: docutrace-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - docutrace-network

volumes:
  postgres_data:
  document_uploads:
  rabbitmq_data:

networks:
  docutrace-network:
    driver: bridge
