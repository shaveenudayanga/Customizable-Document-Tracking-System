name: User Service CI/CD

on:
  push:
    branches: [main, develop, feature/*]
    paths:
      - 'backend/user-service/**'
      - '.github/workflows/user-service-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/user-service/**'
      - '.github/workflows/user-service-ci.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  REGISTRY: docker.io
  IMAGE_NAME: user-service

jobs:
  # ================================
  # Code Quality & Security
  # ================================
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      - name: Validate Maven project
        working-directory: backend/user-service
        run: ./mvnw validate
        
      - name: Check code formatting
        working-directory: backend/user-service
        run: ./mvnw spotless:check || echo "Code formatting check failed"
        
      - name: Run static analysis with SpotBugs
        working-directory: backend/user-service
        run: ./mvnw compile spotbugs:check || echo "SpotBugs analysis completed"

  # ================================
  # Build & Test
  # ================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        profile: [dev, test]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          
      - name: Run tests with ${{ matrix.profile }} profile
        working-directory: backend/user-service
        run: |
          ./mvnw clean test -P${{ matrix.profile }} \
            -Dmaven.test.failure.ignore=false \
            -Dspring.profiles.active=${{ matrix.profile }}
            
      - name: Generate test report
        working-directory: backend/user-service
        run: ./mvnw surefire-report:report
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.profile }}
          path: |
            backend/user-service/target/surefire-reports/
            backend/user-service/target/site/
          retention-days: 5

  # ================================
  # Package & Build
  # ================================
  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: build-and-test
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          
      - name: Extract version
        id: version
        working-directory: backend/user-service
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"
          
      - name: Package application
        working-directory: backend/user-service
        run: |
          ./mvnw clean package -DskipTests \
            -Dspring.profiles.active=prod
            
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: backend/user-service/target/*.jar
          retention-days: 5

  # ================================
  # Docker Build & Push
  # ================================
  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend/user-service
          file: backend/user-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          
      - name: Image vulnerability scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ================================
  # Integration Tests
  # ================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: docutrace_users_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          
      - name: Run integration tests
        working-directory: backend/user-service
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: docutrace_users_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          ./mvnw test -Dtest="*IntegrationTest" \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/docutrace_users_test
            
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/user-service/target/surefire-reports/
          retention-days: 5

  # ================================
  # Security Scan
  # ================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: package
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          
      - name: Run OWASP Dependency Check
        working-directory: backend/user-service
        run: |
          ./mvnw dependency-check:check \
            -DfailBuildOnCVSS=8 \
            -DsuppressionsFilename=dependency-check-suppressions.xml
            
      - name: Upload OWASP Dependency Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: backend/user-service/target/dependency-check-report.html
          retention-days: 5

  # ================================
  # Deploy to Staging
  # ================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build-push, integration-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          wait: 120s
          
      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f backend/user-service/k8s/postgres.yaml
          kubectl wait --for=condition=ready pod -l app=postgres --timeout=180s
          
      - name: Create secrets
        run: |
          kubectl create secret generic user-service-secret \
            --from-literal=POSTGRES_USER=postgres \
            --from-literal=POSTGRES_PASSWORD=postgres \
            --from-literal=REFRESH_HMAC_SECRET=staging-refresh-secret \
            --from-literal=MAGIC_TOKEN_HMAC_SECRET=staging-magic-secret \
            --from-literal=JWT_ISSUER=http://staging-user-service \
            --from-literal=JWT_AUDIENCE=docutrace-staging \
            --dry-run=client -o yaml | kubectl apply -f -
            
      - name: Update deployment image
        run: |
          sed -i "s|image: .*user-service:.*|image: ${{ needs.docker-build-push.outputs.image }}|g" \
            backend/user-service/k8s/deployment.yaml
            
      - name: Deploy user service
        run: |
          kubectl apply -f backend/user-service/k8s/
          kubectl wait --for=condition=ready pod -l app=user-service --timeout=180s
          
      - name: Run smoke tests
        run: |
          kubectl port-forward svc/user-service 8080:8080 &
          sleep 10
          
          # Basic health check
          curl -f http://localhost:8080/actuator/health || exit 1
          
          # OIDC discovery
          curl -f http://localhost:8080/.well-known/openid-configuration || exit 1
          
          # JWKS endpoint
          curl -f http://localhost:8080/oauth2/jwks || exit 1
          
          echo "Smoke tests passed!"

  # ================================
  # Deploy to Production
  # ================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build-push, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to production
        run: |
          echo "Production deployment would happen here"
          echo "Image: ${{ needs.docker-build-push.outputs.image }}"
          echo "Digest: ${{ needs.docker-build-push.outputs.digest }}"
          
      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment notification would be sent here"