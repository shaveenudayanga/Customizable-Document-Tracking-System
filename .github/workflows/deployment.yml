name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string
      force_deploy:
        description: 'Force deployment even if version already deployed'
        required: false
        default: false
        type: boolean
  
  push:
    branches:
      - main
    paths:
      - 'backend/user-service/**'
  
  pull_request:
    branches:
      - main
    types: [closed]
    paths:
      - 'backend/user-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ================================
  # Build and Push Image
  # ================================
  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
          labels: |
            org.opencontainers.image.title=DocuTrace User Service
            org.opencontainers.image.description=Multi-tenant user management microservice
            org.opencontainers.image.vendor=DocuTrace
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend/user-service
          file: backend/user-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.version }}
          path: sbom.spdx.json
          retention-days: 90

  # ================================
  # Deploy to Staging
  # ================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging-api.docutrace.example.com
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
          
      - name: Configure kubectl for staging
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context
          
      - name: Deploy database migrations
        run: |
          export KUBECONFIG=kubeconfig
          kubectl create job migration-$(date +%s) \
            --from=cronjob/user-service-migration \
            --namespace=staging || echo "Migration job creation failed"
            
      - name: Update deployment
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/user-service \
            user-service=${{ needs.build-image.outputs.image-tag }} \
            --namespace=staging
            
      - name: Wait for deployment rollout
        run: |
          export KUBECONFIG=kubeconfig
          kubectl rollout status deployment/user-service \
            --namespace=staging \
            --timeout=300s
            
      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          kubectl wait --for=condition=ready pod \
            -l app=user-service \
            --namespace=staging \
            --timeout=300s
            
          # Get service URL
          SERVICE_URL=$(kubectl get svc user-service \
            --namespace=staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            
          # Run basic health check
          curl -f http://$SERVICE_URL:8080/actuator/health || exit 1
          
      - name: Run integration tests
        run: |
          cd backend/user-service
          ./scripts/user-service-smoke.sh staging
          
      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

  # ================================
  # Deploy to Production
  # ================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[deploy-prod]'))
    environment:
      name: production
      url: https://api.docutrace.example.com
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
          
      - name: Configure kubectl for production
        run: |
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl config current-context
          
      - name: Pre-deployment backup
        run: |
          export KUBECONFIG=kubeconfig
          # Create database backup
          kubectl create job db-backup-$(date +%s) \
            --from=cronjob/database-backup \
            --namespace=production
            
      - name: Deploy database migrations
        run: |
          export KUBECONFIG=kubeconfig
          kubectl create job migration-$(date +%s) \
            --from=cronjob/user-service-migration \
            --namespace=production
            
      - name: Blue-Green deployment
        run: |
          export KUBECONFIG=kubeconfig
          
          # Check current deployment
          CURRENT_VERSION=$(kubectl get deployment user-service \
            --namespace=production \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
            
          echo "Current version: $CURRENT_VERSION"
          echo "New version: ${{ needs.build-image.outputs.image-tag }}"
          
          # Create new deployment with green suffix
          kubectl get deployment user-service \
            --namespace=production \
            -o yaml | \
          sed 's/name: user-service/name: user-service-green/' | \
          sed 's/app: user-service/app: user-service-green/' | \
          kubectl apply -f -
          
          # Update green deployment with new image
          kubectl set image deployment/user-service-green \
            user-service=${{ needs.build-image.outputs.image-tag }} \
            --namespace=production
            
          # Wait for green deployment
          kubectl rollout status deployment/user-service-green \
            --namespace=production \
            --timeout=300s
            
      - name: Run production smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          
          # Get green service endpoint
          kubectl port-forward deployment/user-service-green 8080:8080 \
            --namespace=production &
          PORT_FORWARD_PID=$!
          
          sleep 10
          
          # Run smoke tests against green deployment
          curl -f http://localhost:8080/actuator/health || {
            kill $PORT_FORWARD_PID
            exit 1
          }
          
          kill $PORT_FORWARD_PID
          
      - name: Switch traffic to green
        run: |
          export KUBECONFIG=kubeconfig
          
          # Update service selector to point to green
          kubectl patch service user-service \
            --namespace=production \
            -p '{"spec":{"selector":{"app":"user-service-green"}}}'
            
      - name: Cleanup old deployment
        run: |
          export KUBECONFIG=kubeconfig
          
          # Wait a bit for traffic to stabilize
          sleep 30
          
          # Delete old blue deployment
          kubectl delete deployment user-service \
            --namespace=production --ignore-not-found=true
            
          # Rename green to blue
          kubectl patch deployment user-service-green \
            --namespace=production \
            -p '{"metadata":{"name":"user-service"},"spec":{"selector":{"matchLabels":{"app":"user-service"}},"template":{"metadata":{"labels":{"app":"user-service"}}}}}'
            
      - name: Post-deployment verification
        run: |
          export KUBECONFIG=kubeconfig
          
          # Run comprehensive tests
          cd backend/user-service
          ./scripts/user-service-smoke.sh production
          
          # Check metrics and logs
          kubectl logs deployment/user-service \
            --namespace=production \
            --tail=100
            
      - name: Update deployment tracking
        run: |
          # Record deployment in tracking system
          curl -X POST "${{ secrets.DEPLOYMENT_TRACKER_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_TRACKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "user-service",
              "environment": "production",
              "version": "${{ needs.build-image.outputs.version }}",
              "image": "${{ needs.build-image.outputs.image-tag }}",
              "commit": "${{ github.sha }}",
              "deployed_by": "${{ github.actor }}",
              "deployed_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'
            
      - name: Notify production deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#production-deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

  # ================================
  # Rollback
  # ================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
          
      - name: Configure kubectl
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > kubeconfig
            NAMESPACE="production"
          else
            echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > kubeconfig
            NAMESPACE="staging"
          fi
          export KUBECONFIG=kubeconfig
          kubectl config current-context
          
      - name: Rollback deployment
        run: |
          export KUBECONFIG=kubeconfig
          NAMESPACE=${{ github.event.inputs.environment || 'staging' }}
          
          # Rollback to previous version
          kubectl rollout undo deployment/user-service \
            --namespace=$NAMESPACE
            
          # Wait for rollback to complete
          kubectl rollout status deployment/user-service \
            --namespace=$NAMESPACE \
            --timeout=300s
            
      - name: Verify rollback
        run: |
          export KUBECONFIG=kubeconfig
          NAMESPACE=${{ github.event.inputs.environment || 'staging' }}
          
          kubectl wait --for=condition=ready pod \
            -l app=user-service \
            --namespace=$NAMESPACE \
            --timeout=300s
            
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🚨 ROLLBACK COMPLETED",
              attachments: [{
                color: "warning",
                fields: [{
                  title: "Service",
                  value: "user-service",
                  short: true
                }, {
                  title: "Environment", 
                  value: "${{ github.event.inputs.environment || 'staging' }}",
                  short: true
                }, {
                  title: "Trigger",
                  value: "Deployment failure",
                  short: true
                }, {
                  title: "Commit",
                  value: "${{ github.sha }}",
                  short: true
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
