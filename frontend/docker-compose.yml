version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_DEV_MODE=false
        - VITE_USE_MOCK_FALLBACK=false
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - docutrace-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Add your backend service here
  backend:
    # build: ../backend
    image: docutrace-backend:latest
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - docutrace-network
    restart: unless-stopped

networks:
  docutrace-network:
    driver: bridge

volumes:
  docutrace-data:
