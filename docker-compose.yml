version: '3.8'

services:
  postgres-documents:
    image: postgres:16
    container_name: postgres-documents
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  document-service:
    build:
      context: ./backend/document-service
      dockerfile: Dockerfile
    container_name: document-service
    depends_on:
      postgres-documents:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-documents:5432/document_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: po
      STORAGE_BASE_PATH: /data/docs
      SPRING_SERVER_PORT: 8082
    volumes:
      - docs-storage:/data/docs
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  docs-storage:
